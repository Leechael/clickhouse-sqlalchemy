on:
  push:
    paths-ignore:
      - "docs/**"
      - "README.rst"
      - "CHANGELOG.md"
      - "CONTRIBUTING.rst"
      - ".github/workflows/docs.yml"
      - ".github/workflows/pages.yml"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "README.rst"
      - "CHANGELOG.md"
      - "CONTRIBUTING.rst"
      - ".github/workflows/docs.yml"
      - ".github/workflows/pages.yml"
name: "SQLAlchemy >=2.0.0 versions"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.12"
        clickhouse-version:
          - 23.8.4.69
        sa-version:
          - "2.0.0"
          - "2.0.49"
        include:
          - python-version: "3.12"
            clickhouse-version: 23.8.4.69
            sa-version: "2.1.0b2"
            allow-failure: true
    continue-on-error: ${{ matrix.allow-failure || false }}
    services:
      clickhouse-server:
        image: clickhouse/clickhouse-server:${{ matrix.clickhouse-version }}
        ports:
          - 8123:8123
          - 9000:9000

    name: ${{ matrix.python-version }} SA=${{ matrix.sa-version }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          architecture: x64
      - name: Install test requirements
        run: |
          pip install --upgrade pip
          pip install pdm
          pdm config venv.with_pip true
          pdm install -G test
      - name: Install SQLAlchemy
        run: pdm run python -m pip install --pre sqlalchemy==${{ matrix.sa-version }}
      - name: Run tests
        run: pdm run pytest --timeout=10 -v
        timeout-minutes: 2
