minimum_prek_version = "0.4.0"
default_install_hook_types = ["pre-commit"]

[[repos]]
repo = "builtin"

[[repos.hooks]]
id = "trailing-whitespace"

[[repos.hooks]]
id = "end-of-file-fixer"

[[repos.hooks]]
id = "mixed-line-ending"
args = ["--fix=lf"]

[[repos.hooks]]
id = "check-toml"

[[repos.hooks]]
id = "check-yaml"

[[repos.hooks]]
id = "check-json"

[[repos.hooks]]
id = "check-xml"

[[repos.hooks]]
id = "check-merge-conflict"
args = ["--assume-in-merge"]

[[repos.hooks]]
id = "detect-private-key"

[[repos.hooks]]
id = "check-added-large-files"
args = ["--maxkb=1024"]

[[repos.hooks]]
id = "check-case-conflict"

[[repos.hooks]]
id = "check-illegal-windows-names"

[[repos.hooks]]
id = "check-symlinks"

[[repos.hooks]]
id = "destroyed-symlinks"

[[repos]]
repo = "local"

[[repos.hooks]]
id = "flake8"
name = "flake8"
language = "system"
entry = "pdm run lint"
files = "\\.py$"
pass_filenames = false

[[repos.hooks]]
id = "pdm-lock-check"
name = "pdm lock --check"
language = "system"
entry = "pdm lock -p . --check"
files = "^(pyproject\\.toml|pdm\\.lock)$"
pass_filenames = false

[[repos.hooks]]
id = "alembic-tests"
name = "Alembic tests"
language = "system"
entry = "pdm run test-alembic"
files = "^(clickhouse_sqlalchemy/alembic/|tests/alembic/|tests/config\\.py|tests/session\\.py|tests/testcase\\.py|pyproject\\.toml|pdm\\.lock)$"
pass_filenames = false
